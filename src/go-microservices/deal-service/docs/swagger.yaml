basePath: /
definitions:
  domain.Booking:
    properties:
      cancelled_at:
        type: string
      check_in:
        type: string
      check_out:
        type: string
      client_id:
        type: string
      created_at:
        type: string
      guests:
        type: integer
      id:
        type: string
      sanatorium_id:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  domain.Sanatorium:
    properties:
      address:
        type: string
      amenities:
        items:
          type: string
        type: array
      city:
        type: string
      created_at:
        type: string
      description:
        type: string
      distance_to_sea_km:
        type: number
      id:
        type: string
      image_urls:
        items:
          type: string
        type: array
      latitude:
        type: number
      longitude:
        type: number
      medical_profiles:
        items:
          type: string
        type: array
      name:
        type: string
      price_per_night:
        type: number
      total_places:
        type: integer
      updated_at:
        type: string
    type: object
  httptransport.createBookingRequest:
    properties:
      check_in:
        type: string
      check_out:
        type: string
      guests:
        type: integer
      sanatorium_id:
        type: string
    type: object
  httptransport.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  httptransport.updateBookingRequest:
    properties:
      check_in:
        type: string
      check_out:
        type: string
      guests:
        type: integer
    type: object
  service.ListBookingsResult:
    properties:
      items:
        items:
          $ref: '#/definitions/domain.Booking'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  service.ListSanatoriumsResult:
    properties:
      items:
        items:
          $ref: '#/definitions/domain.Sanatorium'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  service.SanatoriumDetailsResult:
    properties:
      available:
        type: boolean
      sanatorium:
        $ref: '#/definitions/domain.Sanatorium'
    type: object
info:
  contact: {}
  description: Deal service with sanatorium catalog and client bookings.
  title: Sanatorium Booking API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Proxies login request to auth-service and returns access token.
      parameters:
      - description: Login payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/httptransport.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Login and get JWT token
      tags:
      - auth
  /api/bookings:
    get:
      description: Returns booking list for authorized client.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.ListBookingsResult'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List current client bookings
      tags:
      - bookings
    post:
      consumes:
      - application/json
      description: Creates booking for authorized client (role=client).
      parameters:
      - description: Booking payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/httptransport.createBookingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Booking'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create booking
      tags:
      - bookings
  /api/bookings/{id}:
    delete:
      description: Cancels booking of authorized client.
      parameters:
      - description: Booking ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Booking'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Cancel booking
      tags:
      - bookings
    get:
      description: Returns one booking of authorized client.
      parameters:
      - description: Booking ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Booking'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get booking details
      tags:
      - bookings
    put:
      consumes:
      - application/json
      description: Updates booking dates and guests for authorized client.
      parameters:
      - description: Booking ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Update booking payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/httptransport.updateBookingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Booking'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update booking
      tags:
      - bookings
  /api/sanatoriums:
    get:
      description: Returns sanatorium catalog with pagination, filtering and sorting.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Page size
        in: query
        name: page_size
        type: integer
      - description: City filter
        in: query
        name: city
        type: string
      - description: 'Medical profiles (CSV), example: cardiology,pulmonology'
        in: query
        name: profiles
        type: string
      - description: Maximum distance to sea in km
        in: query
        name: max_distance_to_sea
        type: number
      - description: Minimum price per night
        in: query
        name: price_min
        type: number
      - description: Maximum price per night
        in: query
        name: price_max
        type: number
      - description: Availability start date (YYYY-MM-DD)
        in: query
        name: check_in
        type: string
      - description: Availability end date (YYYY-MM-DD)
        in: query
        name: check_out
        type: string
      - description: 'Sort mode: price_asc,price_desc,distance_asc,distance_desc'
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.ListSanatoriumsResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: List sanatoriums
      tags:
      - sanatoriums
  /api/sanatoriums/{id}:
    get:
      description: Returns detailed information for one sanatorium.
      parameters:
      - description: Sanatorium ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Availability start date (YYYY-MM-DD)
        in: query
        name: check_in
        type: string
      - description: Availability end date (YYYY-MM-DD)
        in: query
        name: check_out
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.SanatoriumDetailsResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get sanatorium details
      tags:
      - sanatoriums
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
