  internal_transport_http.sanatoriumBody:
    properties:
      address:
        type: string
      amenities:
        items:
          type: string
        type: array
      city:
        type: string
      description:
        type: string
      distance_to_sea_km:
        type: number
      image_urls:
        items:
          type: string
        type: array
      latitude:
        type: number
      longitude:
        type: number
      medical_profiles:
        items:
          type: string
        type: array
      name:
        type: string
      price_per_night:
        type: number
      total_places:
        type: integer
    type: object
  internal_transport_http.statusUpdatedResponse:
    properties:
      status:
        type: string
    type: object
  internal_transport_http.updateBookingRequest:
    properties:
      check_in:
        type: string
      check_out:
        type: string
      guests:
        type: integer
    type: object
  internal_transport_http.updateStatusRequest:
    properties:
      status:
        type: string
    type: object
info:
  contact: {}
  description: Public catalog and client bookings; auth proxy; admin API for bookings,
    contracts and sanatoriums. Payment is internal (deal → payment-service).
  title: Sanatorium Booking API (deal-service)
  version: "1.1"
paths:
  /api/admin/bookings:
    get:
      parameters:
      - default: 1
        description: Page
        in: query
        name: page
        type: integer
      - default: 15
        description: Page size
        in: query
        name: page_size
        type: integer
      - description: 'Booking status: confirmed, cancelled'
        in: query
        name: status
        type: string
      - description: 'Payment status: unpaid, invoice_issued, invoice_failed, paid'
        in: query
        name: payment_status
        type: string
      - description: Filter by sanatorium city
        in: query
        name: city
        type: string
      - description: Filter by sanatorium UUID
        in: query
        name: sanatorium_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/coursework_deal-service_internal_service.ListBookingsResult'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List all bookings (admin)
      tags:
      - admin-bookings
  /api/admin/bookings/{id}:
    delete:
      parameters:
      - description: Booking ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/coursework_deal-service_internal_domain.Booking'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Cancel booking (admin)
      tags:
      - admin-bookings
  /api/admin/bookings/{id}/checkout:
    post:
      parameters:
      - description: Booking ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/coursework_deal-service_internal_domain.Booking'
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Issue invoice for booking (admin)
      tags:
      - admin-bookings
  /api/admin/bookings/{id}/pay:
    post:
      parameters:
      - description: Booking ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Idempotency key
        in: header
        name: Idempotency-Key
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/coursework_deal-service_internal_service.PayBookingResult'
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Pay booking invoice (admin)
      tags:
      - admin-bookings
  /api/admin/contracts:
    get:
      parameters:
      - default: 1
        description: Page
        in: query
        name: page
        type: integer
      - default: 10
        description: Page size
        in: query
        name: page_size
        type: integer
      - description: Contract status
        in: query
        name: status
        type: string
      - description: Payment status
        in: query
        name: payment_status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/coursework_deal-service_internal_service.ListContractsResult'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List contracts (admin)
      tags:
      - admin-contracts
    post:
      consumes:
      - application/json
      description: Creates contract and invoice. manager_id defaults to JWT subject
        if omitted.
      parameters:
      - description: Contract payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_transport_http.createContractRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/coursework_deal-service_internal_domain.Contract'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Bad Gateway
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create contract (admin)
      tags:
      - admin-contracts
  /api/admin/contracts/{id}:
    get:
      parameters:
      - description: Contract ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/coursework_deal-service_internal_domain.Contract'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get contract by ID (admin)
      tags:
      - admin-contracts
  /api/admin/contracts/{id}/pay:
    post:
      parameters:
      - description: Contract ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Idempotency key
        in: header
        name: Idempotency-Key
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/coursework_deal-service_internal_domain.Contract'
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Pay contract invoice (admin)
      tags:
      - admin-contracts
  /api/admin/contracts/{id}/status:
    patch:
      consumes:
      - application/json
      parameters:
      - description: Contract ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: New status
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_transport_http.updateStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_transport_http.statusUpdatedResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update contract status (admin)
      tags:
      - admin-contracts
  /api/admin/sanatoriums:
    get:
      parameters:
      - default: 1
        description: Page
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/coursework_deal-service_internal_service.ListSanatoriumsAdminResult'
      security:
      - BearerAuth: []
      summary: List sanatoriums (admin)
      tags:
      - admin-sanatoriums
    post:
      consumes:
      - application/json
      parameters:
      - description: Sanatorium
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_transport_http.sanatoriumBody'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/coursework_deal-service_internal_domain.Sanatorium'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create sanatorium (admin)
      tags:
      - admin-sanatoriums
  /api/admin/sanatoriums/{id}:
    delete:
      description: Fails with 409 if active confirmed bookings exist.
      parameters:
      - description: Sanatorium ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_transport_http.deletedResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete sanatorium (admin)
      tags:
      - admin-sanatoriums
    put:
      consumes:
      - application/json
      parameters:
      - description: Sanatorium ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Sanatorium
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_transport_http.sanatoriumBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/coursework_deal-service_internal_domain.Sanatorium'
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update sanatorium (admin)
      tags:
      - admin-sanatoriums
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Proxies login request to auth-service and returns access token.
      parameters:
      - description: Login payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_transport_http.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_transport_http.loginResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Login and get JWT token
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Registers a new user with role=client via auth-service.
      parameters:
      - description: Registration payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_transport_http.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User object (id, email, full_name, role, created_at)
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Register new client
      tags:
      - auth
  /api/bookings:
    get:
      description: Returns booking list for authorized client.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/coursework_deal-service_internal_service.ListBookingsResult'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List current client bookings
      tags:
      - bookings
    post:
      consumes:
      - application/json
      description: Creates booking for authorized client (role=client).
      parameters:
      - description: Booking payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_transport_http.createBookingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/coursework_deal-service_internal_domain.Booking'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create booking
      tags:
      - bookings
  /api/bookings/{id}:
    delete:
      description: Cancels booking of authorized client.
      parameters:
      - description: Booking ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/coursework_deal-service_internal_domain.Booking'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Cancel booking
      tags:
      - bookings
    get:
      description: Returns one booking of authorized client.
      parameters:
      - description: Booking ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/coursework_deal-service_internal_domain.Booking'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get booking details
      tags:
      - bookings
    put:
      consumes:
      - application/json
      description: Updates booking dates and guests for authorized client.
      parameters:
      - description: Booking ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Update booking payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_transport_http.updateBookingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/coursework_deal-service_internal_domain.Booking'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update booking
      tags:
      - bookings
  /api/bookings/{id}/checkout:
    post:
      description: Calculates amount from nights × price_per_night and creates payment
        invoice.
      parameters:
      - description: Booking ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/coursework_deal-service_internal_domain.Booking'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create invoice for booking (client)
      tags:
      - bookings
  /api/bookings/{id}/pay:
    post:
      parameters:
      - description: Booking ID (UUID)
        in: path
        name: id
        required: true
        type: string
